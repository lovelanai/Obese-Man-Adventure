<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="reusable.css">
    <link rel="stylesheet" href="game2.css">


</head>

<body>



    <main id="gamefullscreen">


        <div id="startbtn" class="container">



            <audio id="audio">
                <source src="assets/music/Mario-coin-sound.mp3" type="audio/mpeg">
            </audio>
            <button onmousedown="bleep.play()" onclick="myFunction()" class="start-logo">
                <a class="start-logo, text-color-effect" >START</a></button>


            <div>
                <p class="start-coin">INSERT COIN</p>
            </div>







        </div>

        <div id="game" style="background-color: rgb(255, 206, 115); " class="container none">

            <button class="start-coin" id="musicbtn" onclick="openMusic();openFullscreen()">
                <a onmousedown="hit.play(); song.play()">SOUND ON + FULLSCREEN</a>
            </button>

            <div class="gamemenu none" id="gamemenu">



                <div class="absolute flex" style="top: 88px;">

                    <div class="flex justify-center align-center column"
                        style=" font-size: 20px;  margin-top: 2rem;">
                        <div class="logo">
                            <h2>OBESE-MAN</h2>
                        </div>
                        <div class="logo">
                            <h3>ADVENTURE</h3>
                        </div>
                        <div class="logo">
                            <h2>IV</h2>
                        </div>
                    </div>
                </div>

                <div class="flex align-center justify-center column" style=" width: 36rem; height: 17rem; background-image: url(/assets/img/backplate.png); background-position: center;">





                    <a  onmousedown="slurp.play()">
                        <button id="begin" onclick="begin()" class="backtrans border0" style="color: #FF8220; margin: 3rem;">



                            <h1>
                                BEGIN ADVENTURE
                            </h1>



                        </button>
                    </a>


                    <div class="none" id="nameinput">
                    <div class="absolute" style=" top: 28rem; left: 38rem; color: #FF8220;">
                        <h1>ENTER YOUR NAME</h1>
                    </div>
                <div class="flex">

                    <input id="userinput" class="nameinput" type="entername"> 
                    <div class="flex" style="width: 5rem;  border: 7px solid #FF8220;">
                    <button  class="maxwidth backblack border0" onclick="entername()" onmousedown="warp.play()" style=" color: #01FDFD;" >ENTER</button>
                </div>
                </div>
            </div>



                    <button id="entergame" class="text-color-effect none border0" style="margin: 3rem;"
                        onmousedown="song.pause(); among.play(); magicstart.play(); " onclick="scenetwo()">
                        <h1>
                            ENTER GAME
                        </h1>
                    </button>
                    <p id="demo" style="font-size: 14px; color: rgb(255, 0, 0);"></p>




                </div>

                <div class="flex absolute" style=" left: 0; margin: 3rem;">
                    <img style="height: 780px;" src="assets/img/obeseman.png" alt="">
                </div>

                <div class="flex absolute" style=" right: 0; margin: 3rem;">
                    <img style="height: 780px;" src="assets/img/obeseman.png" alt="">
                </div>


            </div>

        </div>







       
       
       <div id="start-text" style="display: none;">
       
       
        <div id="lore" class="flex column justify-center align-center fullscreen backblack">

            <div class="interlude flex align-center justify-center maxwidth maxheight column">
    
    
                <a class="interlude" style=" margin: 4rem; color: rgb(255, 255, 255);">Outside of the Evil Mansion,
                    MEDIEINSTITUTET...</a>
    
                <div>
                    <button id="continue" class="start-coin" onmousedown="spooky.play(); hit.play()" onclick="house()">
                        <p>continue</p>
                    </button>
                </div>
    
            </div>
    
    
        </div>
    
        <div id="house" class="none column fullscreen justify-center align-center backblack">
    
    
    
            <div class="flex maxheight maxwidth column absolute"
                style="background-image: url(/assets/img/house.jpeg); background-size: cover;">
    
                <div class="relative maxheight maxwidth flex align-end justify-start">
    
                    <div id="textone" class="flex align-center"
                        style=" margin: 4rem ;height: 12rem; width: 40rem; background-color: rgba(0, 0, 0, 0.815);  ">
                        <div style="margin: 1rem;">
                            <span id="text" class="type" style="--n:103"></span>
                        </div>
                        <button class="absolute z1" onclick="nextpage()" style=" margin: 33rem; margin-top: 42rem">NEXT-></button>
                    </div>
    
    
                    <div class="none align-center" id="texttwo"
                        style=" margin: 4rem ;height: 12rem; width: 40rem; background-color: rgba(0, 0, 0, 0.815);  ">
                        <div style="margin: 1rem;">
    
                            <span id="text" class="type" style="--n:103;"></span>
                        </div>
    
                        <button class="absolute z1" onclick="closepage()" style=" margin: 33rem; margin-top: 42rem">GO
                            -></button>
                    </div>
    
    
    
                    <div class="arrow absolute z1 none" id="arrow" onclick="gotogamethree()">
    
                        <button class="maxheight maxwidth backtrans border0">
                            <img class="maxheight maxwidth" src="/assets/img/PinClipart.png" alt="">
                        </button>
                    </div>
    
    
    
                </div>
    
            </div>
    
    
    
    
            <div id="myNav" class="overlaydemo">
                <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
                <div class="overlay-contentdemo">
                    <img style="width: 17rem; height: 40rem;" src="/assets/img/inventory.png" alt="">
                </div>
            </div>
        

            <div style="display: flex; justify-content: flex-end; height: 100%; width: 100%;">
                <span style="cursor: pointer; height:10rem; width: 4rem; position: absolute; top: 29rem;" onclick="openNav()">
                <img style="height: 100%; width: 100%;" src="/assets/img/sidebar.png" alt=""></span>
            </div>
        </div>
    



    
    


    </div>

    </div>

    <iframe id="scenetwo" class="flex game none fullscreen maxwidth" src="game2.html" frameborder="0"></iframe>

        </main>





        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
        <script src="main.js"></script>
        <script src="game2.js"></script>
 
</body>

</html>

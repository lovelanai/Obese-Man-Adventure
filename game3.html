<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="game2.css">
    <link rel="stylesheet" href="reusable.css">
</head>

<body>
    <div id="game3test" class="flex column justify-center align-center fullscreen backblack">

        <div class="interlude flex align-center justify-center maxwidth maxheight column">


            <a class="interlude" style=" margin: 4rem; color: rgb(255, 255, 255);">Welcome to the scienceroom</a>

            <div>
                <button id="enterscienceroom" class="start-coin" onmousedown="hit.play(); labroom.play();" onclick="enterscienceroom()">
                    <p>continue</p>
                </button>
            </div>

        </div>


    </div>

    
    <div id="gamefullscreen" class="column none fullscreen justify-center align-center backblack">

        <div style="position: absolute; top: 0; z-index: 20;"><button onclick="openFullscreen()">RETURN TO FULLSCREEN</button></div>



        <div class="flex maxheight maxwidth column absolute"
            style="background-image: url(/assets/img/laboratory.png); background-size: cover;">

            <div class="relative maxheight maxwidth flex align-end justify-start">


                <div class="flex absolute" style="right: 14rem; bottom: 13rem;">
                    <img style="height: 30rem;" id="bigman" src="assets/img/obeseman.png" alt="bigman">
                    <img class="none" id="sadbigman" style="height: 30rem;" src="assets/img/fatcry.png" alt="sad bigman">
                </div>


                <div id="s3text1" class="flex align-center textbox">
                    <div style="margin: 1rem;">
                        <span id="text" class="type" style="--n:103"></span>
                    </div>
                    <button class="absolute z1" onmousedown="clicksound.play()" onclick="s3text1()"
                        style=" margin: 33rem; margin-top: 42rem">CLOSE-></button>
                </div>

                <div style="margin-left:6rem; margin-bottom:28rem;" class="s2arrow absolute z1 none" id="s3arrow" onclick="bubblebox()">
                    <button class="maxheight maxwidth backtrans border0">
                        <img class="maxheight maxwidth" src="/assets/img/PinClipartleft.png" alt="">
                    </button>
                </div>

                <div style="margin-left:94rem; margin-bottom:24rem;" class="s2arrow absolute z1 none" id="s3arrow2" onclick="leavescienceroom1()">
                    <button class="maxheight maxwidth backtrans border0">
                        <img class="maxheight maxwidth" src="/assets/img/PinClipartright.png" alt="">
                    </button>
                </div>



                <div id="bubblebox"  class="none absolute" style="top:10rem; left:1rem;">    
                        <img  style="height: 15rem;" src="/assets/img/chatbubble.png" alt="">

                        <div class="flex align-center bubblebox">
                            <div style="margin: 1rem;">
                                <span id="text" class="bubble" style="--n:103;"></span>
                            </div>
                            <button class="absolute z1" onmousedown="clicksound.play()" onclick="s3text2()"
                                style="top:7.5rem; left: 21rem;">CLOSE-></button>

                        </div>
                </div>

                <div id="s3text2" class="none align-center textbox">
                    <div style="margin: 1rem;">
                        <span id="text" class="type" style="--n:103"></span>
                    </div>
                    <button class="absolute z1" onmousedown="clicksound.play()" onclick="closes3text2()"
                        style=" margin: 33rem; margin-top: 42rem">CLOSE-></button>
                </div>
                




    


</div>
</div>
</div>


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="audio.js"></script>
    <script src="game2.js"></script>
    <script src="main.js"></script>
</body>

</html>
